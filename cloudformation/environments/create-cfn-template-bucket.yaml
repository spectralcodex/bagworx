AWSTemplateFormatVersion: 2010-09-09
Description: CFN for creating an S3 bucket for nested stack templates and
  applying a policy for access from CloudFormation and EC2 instances

Parameters:
  S3BucketName:
    Type: String
    Default: cfn-templates-github-actions

Resources:
  PipelineArtifactS3Bucket: null
  Type: AWS::S3::Bucket
  Properties:
    BucketName: 
      Ref: S3BucketName

  PipelineArtifactS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: 
        Ref: PipelineArtifactS3Bucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: AllowS3AccessForCFNService
            Principal:
              Service:
                - cloudformation.amazonaws.com
                - ec2.amazonaws.com
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:PutObject
              - s3:ListBucket
            Resource: 
              Fn::Sub:
                - arn:${AWS::Partition}:s3:::${S3BucketName}/*
                - arn:${AWS::Partition}:s3:::${S3BucketName}