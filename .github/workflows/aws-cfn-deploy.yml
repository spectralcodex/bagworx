name: AWS CloudFormation CI/CD using GitHub Actions

on:
  push:
    branches:
      - 'feature/*'
      
  workflow_dispatch:
    inputs:
      environment:
        description: Choose deployment environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        

env:
  AWS_REGION:  ${{ vars.AWS_REGION }}
  BUCKET_NAME: cfn-templates-github-actions

jobs:
  
  create_bucket:
    name: Create S3 Bucket
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy bucket stack
        run: |
             aws cloudformation deploy \
              --stack-name cfn-template-bucket \
              --template-file cloudformation/environments/create-cfn-template-bucket.yaml \
              --region $AWS_REGION \
              --capabilities CAPABILITY_NAMED_IAM


  copy_template_to_s3:
    name: Upload Templates to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy templates to S3
        run: |
             aws s3 cp cloudformation/environments/ s3://${BUCKET_NAME}/environments/ --recursive


  lock_file:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v3
        - uses: ./.github/actions/setup
        - run: uv lock --locked


  linting:
    name: Lint Cloudformation Templates
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup
      - name: lint_cfn
        run: uvx cfn-lint cloudformation/environments/*.yaml cloudformation/environments/dev/*.yaml

      - name: lint_app
        run: uvx ruff check .
  
  formatting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
        - uses: actions/checkout@v3
        - uses: ./.github/actions/setup
        - run: uvx ruff format --check .

  


  validate_templates_local:
   name: Validate Templates
   needs: [copy_template_to_s3]
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v3
 
     - name: Configure AWS credentials
       uses: aws-actions/configure-aws-credentials@v2
       with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws-region: ${{ env.AWS_REGION }}
 
     - name: Validate all templates
       run: |
            aws cloudformation validate-template \
             --template-url https://cfn-templates-github-actions.s3.eu-west-2.amazonaws.com/environments/${{ inputs.environment }}/root.yaml
    
